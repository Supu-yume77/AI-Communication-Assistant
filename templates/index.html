<!DOCTYPE html>
<html>
<head>
    <title>AI Communication Trainer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <div class="header">
    <h1>AI Communication Assistant</h1>
    <p>Enhance your professional communication with smart feedback</p>
</div>

    <div id="chatBox"></div>

    <div class="input-area">

        <button onclick="sendText()">Analyze</button>
        <button onclick="clearChat()">Clear</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
